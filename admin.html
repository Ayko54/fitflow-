<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitFlow Admin</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#0a0612;color:#fff;}
.top{background:#160a1e;border-bottom:1px solid #2a2a2a;padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
h1{font-size:16px;color:#e8547a;}
.stat{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:4px 12px;font-size:12px;color:#888;}
.stat b{color:#fff;}.stat.g b{color:#22c55e;}.stat.r b{color:#ef4444;}.stat.y b{color:#f59e0b;}
.filters{padding:10px 20px;background:#0f0a1a;border-bottom:1px solid #2a2a2a;display:flex;gap:8px;flex-wrap:wrap;}
input,select{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;padding:7px 12px;font-size:13px;outline:none;}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:12px;cursor:pointer;}
.bg{background:#16a34a;border-color:#15803d;}
.br{background:#dc2626;border-color:#b91c1c;}
.bb{background:#2563eb;border-color:#1d4ed8;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:16px 20px;}
.card{background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:12px;overflow:hidden;}
.card.ok{border-color:#22c55e44;}.card.bad{border-color:#ef444444;}
.imgbox{width:100%;height:130px;background:#111;overflow:hidden;position:relative;}
.imgbox img{width:100%;height:100%;object-fit:cover;}
.imgbox .ni{display:flex;align-items:center;justify-content:center;height:100%;font-size:36px;color:#333;}
.dot{position:absolute;top:6px;left:6px;width:10px;height:10px;border-radius:50%;}
.dok{background:#22c55e;}.dbad{background:#ef4444;}.dwait{background:#f59e0b;}
.ci{padding:8px 10px;}
.cn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.cb{display:flex;gap:4px;}
.cb button{flex:1;padding:4px 0;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-weight:600;}
.bok{background:#16a34a;color:#fff;}.bbad{background:#dc2626;color:#fff;}.bpick{background:#2563eb;color:#fff;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:#160a1e;border:1px solid #333;border-radius:16px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;}
.mhead{padding:14px 18px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;}
.mhead h2{font-size:14px;}
.mbody{flex:1;overflow-y:auto;padding:14px;}
.sbar{display:flex;gap:8px;margin-bottom:12px;}
.sbar input{flex:1;}
.srcs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.sb{padding:5px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:12px;cursor:pointer;}
.sb.on{background:#e8547a;border-color:#e8547a;color:#fff;}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.ri{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;aspect-ratio:1;position:relative;}
.ri:hover{border-color:#e8547a;}.ri.sel{border-color:#22c55e;}
.ri img{width:100%;height:100%;object-fit:cover;display:block;}
.rsrc{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:9px;color:#aaa;padding:2px 5px;text-align:center;}
.mfoot{padding:12px 18px;border-top:1px solid #2a2a2a;display:flex;gap:8px;justify-content:flex-end;align-items:center;}
.msg{color:#666;font-size:12px;}
.upload-area{border:2px dashed #333;border-radius:12px;padding:32px;text-align:center;cursor:pointer;margin-bottom:10px;}
.upload-area:hover{border-color:#e8547a;}
.pag{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.lm{text-align:center;padding:30px;color:#666;}
.curl{display:flex;gap:8px;margin-top:10px;}
.curl input{flex:1;}
</style>
</head>
<body>
<div class="top">
  <h1>🛠 FitFlow Admin</h1>
  <div class="stat g"><b id="sok">0</b> Onaylı</div>
  <div class="stat r"><b id="sbad">0</b> Reddedilen</div>
  <div class="stat y"><b id="spend">0</b> Bekleyen</div>
  <div class="stat"><b id="stot">0</b> Toplam</div>
  <button class="btn" onclick="resetKeys()">🔑 Key</button>
</div>
<div class="filters">
  <input id="fq" placeholder="🔍 Ara..." oninput="applyFilter()" style="width:180px">
  <select id="fst" onchange="applyFilter()">
    <option value="all">Tümü</option>
    <option value="pending" selected>Bekleyenler</option>
    <option value="approved">Onaylılar</option>
    <option value="rejected">Reddedilenler</option>
  </select>
  <select id="fcat" onchange="applyFilter()"><option value="all">Tüm Kategoriler</option></select>
  <button class="btn bg" onclick="approveAll()">✓ Sayfayı Onayla</button>
  <button class="btn" onclick="loadFoods()">↻ Yenile</button>
  <span id="pinfo" style="color:#666;font-size:12px"></span>
</div>
<div id="grid" class="grid"><div class="lm">Yükleniyor...</div></div>
<div class="pag" id="pag"></div>

<div class="overlay" id="ov" onclick="if(event.target===this)closeM()">
<div class="modal">
  <div class="mhead">
    <h2 id="mtitle">Resim Seç</h2>
    <button class="btn br" onclick="closeM()">✕</button>
  </div>
  <div class="mbody">
    <div class="sbar">
      <input id="iq" placeholder="Ara..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn bb" onclick="doSearch()">🔍 Ara</button>
    </div>
    <div class="srcs">
      <button class="sb on" onclick="setSrc('pexels',this)">Pexels</button>
      <button class="sb" onclick="setSrc('pixabay',this)">Pixabay</button>
      <button class="sb" onclick="setSrc('storage',this)">Storage</button>
      <button class="sb" onclick="setSrc('upload',this)">📁 PC'den</button>
    </div>
    <div id="uarea" style="display:none">
      <div class="upload-area" onclick="document.getElementById('finp').click()"
        ondragover="event.preventDefault()" ondrop="onDrop(event)">
        <div style="font-size:36px">📁</div>
        <div style="color:#888;font-size:13px;margin-top:8px">Tıkla veya sürükle bırak</div>
        <input type="file" id="finp" accept="image/*" style="display:none" onchange="onFileSelect(event)">
      </div>
      <div id="uprev" style="display:none;text-align:center">
        <img id="uthumb" style="max-height:160px;border-radius:8px;max-width:100%">
        <div id="umsg" style="margin-top:8px;font-size:13px;color:#888"></div>
      </div>
    </div>
    <div id="rg" class="rg"><div class="lm">Kaynak seç ve ara</div></div>
    <div class="curl">
      <input id="curl" placeholder="Veya URL yapıştır...">
      <button class="btn bg" onclick="useUrl()">Kullan</button>
    </div>
  </div>
  <div class="mfoot">
    <span id="selinfo" class="msg"></span>
    <button class="btn" onclick="closeM()">İptal</button>
    <button class="btn bg" id="savebtn" onclick="doSave()" disabled>✓ Kaydet</button>
  </div>
</div>
</div>

<script>
var SB_URL='https://cmsvgmvymlrfdhhvpuwt.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtc3ZnbXZ5bWxyZmRoaHZwdXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDI2NzIsImV4cCI6MjA5NTQ3ODY3Mn0.yAhOYz2-z0VL3bSfc5YL7nS3Dh1_eOVlxzD-HYjN9sw';
var PEXELS='q80iZBRqts5DwaM1EmkDMTph6DGlkEwY6Pggsqrc18o6j6bt4gkiuX4y';
var STURL='https://cmsvgmvymlrfdhhvpuwt.supabase.co/storage/v1/object/public/food-images/';
var sb=supabase.createClient(SB_URL,SB_KEY);

// Auth
if(localStorage.getItem('ffa')!=='aykan2024'){
  var p=prompt('Admin sifre:');
  if(p!=='aykan2024'){document.body.innerHTML='<h2 style="color:red;padding:40px">Yetkisiz</h2>';throw 0;}
  localStorage.setItem('ffa','aykan2024');
}
var SVCKEY=localStorage.getItem('ffsvc')||'';
if(!SVCKEY){
  SVCKEY=prompt('Supabase Service Role Key (Storage upload icin):');
  if(SVCKEY)localStorage.setItem('ffsvc',SVCKEY);
}
function resetKeys(){
  localStorage.removeItem('ffa');
  localStorage.removeItem('ffsvc');
  location.reload();
}

var foods=[],filtered=[],pg=0,PER=60;
var curFood=null,selUrl=null,curSrc='pexels';

function slug(n){
  return(n||'').toLowerCase()
    .replace(/\u015f/g,'s').replace(/\u011f/g,'g').replace(/\xfc/g,'u')
    .replace(/\xf6/g,'o').replace(/\xe7/g,'c').replace(/\u0131/g,'i')
    .replace(/\u0130/g,'i').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

async function loadFoods(){
  document.getElementById('grid').innerHTML='<div class="lm">Yukleniyor...</div>';
  var r=await sb.from('foods').select('id,name,category,photo_url,photo_status').order('name').limit(5000);
  foods=r.data||[];
  var cats=[...new Set(foods.map(function(f){return f.category;}).filter(Boolean))].sort();
  var s=document.getElementById('fcat');
  s.innerHTML='<option value="all">Tum Kategoriler</option>';
  cats.forEach(function(c){s.innerHTML+='<option value="'+c+'">'+c+'</option>';});
  updateStats();applyFilter();
}

function updateStats(){
  document.getElementById('sok').textContent=foods.filter(function(f){return f.photo_status==='approved';}).length;
  document.getElementById('sbad').textContent=foods.filter(function(f){return f.photo_status==='rejected';}).length;
  document.getElementById('spend').textContent=foods.filter(function(f){return !f.photo_status;}).length;
  document.getElementById('stot').textContent=foods.length;
}

function applyFilter(){
  var q=document.getElementById('fq').value.toLowerCase();
  var st=document.getElementById('fst').value;
  var cat=document.getElementById('fcat').value;
  filtered=foods.filter(function(f){
    if(q&&(f.name||'').toLowerCase().indexOf(q)<0)return false;
    if(cat!=='all'&&f.category!==cat)return false;
    if(st==='approved'&&f.photo_status!=='approved')return false;
    if(st==='rejected'&&f.photo_status!=='rejected')return false;
    if(st==='pending'&&f.photo_status)return false;
    return true;
  });
  pg=0;render();
}

function render(){
  var items=filtered.slice(pg*PER,(pg+1)*PER);
  document.getElementById('pinfo').textContent=filtered.length+' sonuc';
  if(!items.length){document.getElementById('grid').innerHTML='<div class="lm">Sonuc yok</div>';renderPag();return;}
  var html='';
  items.forEach(function(f){
    var s=f.photo_status||'pending';
    var img=f.photo_url||(STURL+slug(f.name)+'.jpg');
    var cls=s==='approved'?'ok':s==='rejected'?'bad':'';
    var dcls=s==='approved'?'dok':s==='rejected'?'dbad':'dwait';
    html+='<div class="card '+cls+'" id="c'+f.id+'">'
      +'<div class="imgbox">'
      +'<img src="'+img+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=ni>&#127374;</div>\'">'
      +'<div class="dot '+dcls+'"></div>'
      +'</div>'
      +'<div class="ci">'
      +'<div class="cn" title="'+f.name+'">'+f.name+'</div>'
      +'<div class="cb">'
      +'<button class="bok" onclick="doApprove(\''+f.id+'\')">&#10003;</button>'
      +'<button class="bbad" onclick="doReject(\''+f.id+'\')">&#10007;</button>'
      +'<button class="bpick" onclick="openPick(\''+f.id+'\')">&#128269;</button>'
      +'</div>'
      +'</div>'
      +'</div>';
  });
  document.getElementById('grid').innerHTML=html;
  renderPag();
}

function renderPag(){
  var tot=Math.ceil(filtered.length/PER);
  var el=document.getElementById('pag');
  if(tot<=1){el.innerHTML='';return;}
  el.innerHTML=(pg>0?'<button class="btn" onclick="goPage('+(pg-1)+')">&#8592; Onceki</button>':'')
    +'<span style="color:#666;font-size:13px;padding:8px">'+(pg+1)+'/'+tot+'</span>'
    +(pg<tot-1?'<button class="btn" onclick="goPage('+(pg+1)+')">Sonraki &#8594;</button>':'');
}
function goPage(p){pg=p;render();window.scrollTo(0,0);}

async function doApprove(id){
  var r=await sb.from('foods').update({photo_status:'approved'}).eq('id',id).select();
  if(r.error){alert('Hata: '+r.error.message);return;}
  var f=foods.find(function(x){return x.id==id;});
  if(f)f.photo_status='approved';
  var c=document.getElementById('c'+id);
  if(c){c.className='card ok';c.querySelector('.dot').className='dot dok';}
  updateStats();
}

async function doReject(id){
  var r=await sb.from('foods').update({photo_status:'rejected'}).eq('id',id).select();
  if(r.error){alert('Hata: '+r.error.message);return;}
  var f=foods.find(function(x){return x.id==id;});
  if(f)f.photo_status='rejected';
  var c=document.getElementById('c'+id);
  if(c){c.className='card bad';c.querySelector('.dot').className='dot dbad';}
  updateStats();
}

async function approveAll(){
  var items=filtered.slice(pg*PER,(pg+1)*PER);
  if(!confirm(items.length+' yemegi onayla?'))return;
  for(var i=0;i<items.length;i++){
    await sb.from('foods').update({photo_status:'approved'}).eq('id',items[i].id);
    items[i].photo_status='approved';
  }
  updateStats();render();
}

function openPick(id){
  var f=foods.find(function(x){return x.id==id;});
  if(!f)return;
  curFood=f;selUrl=null;
  document.getElementById('mtitle').textContent='Resim Sec: '+f.name;
  document.getElementById('iq').value=f.name;
  document.getElementById('savebtn').disabled=true;
  document.getElementById('selinfo').textContent='';
  document.getElementById('curl').value='';
  document.getElementById('rg').innerHTML='<div class="lm">Aranıyor...</div>';
  document.getElementById('ov').classList.add('show');
  setSrcActive('pexels');
  doSearch();
}
function closeM(){document.getElementById('ov').classList.remove('show');}

function setSrcActive(src){
  curSrc=src;
  document.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.sb').forEach(function(b){
    if(b.textContent.toLowerCase().indexOf(src.toLowerCase())>=0)b.classList.add('on');
  });
  var ua=document.getElementById('uarea');
  var sb2=document.querySelector('.sbar');
  if(src==='upload'){ua.style.display='block';sb2.style.display='none';document.getElementById('rg').innerHTML='';}
  else{ua.style.display='none';sb2.style.display='flex';}
}

function setSrc(src,btn){
  setSrcActive(src);
  if(src!=='upload')doSearch();
}

async function doSearch(){
  var q=document.getElementById('iq').value.trim();
  if(!q)return;
  document.getElementById('rg').innerHTML='<div class="lm">Aranıyor...</div>';
  if(curSrc==='pexels')await searchPexels(q);
  else if(curSrc==='pixabay')await searchPixabay(q);
  else if(curSrc==='storage')searchStorage(q);
}

async function searchPexels(q){
  try{
    var r=await fetch('https://api.pexels.com/v1/search?query='+encodeURIComponent(q+' food')+'&per_page=24&orientation=square',
      {headers:{Authorization:PEXELS}});
    var d=await r.json();
    showRes((d.photos||[]).map(function(p){return{url:p.src.medium,src:'Pexels'};}));
  }catch(e){document.getElementById('rg').innerHTML='<div class="lm">Hata: '+e.message+'</div>';}
}

async function searchPixabay(q){
  try{
    var r=await fetch('https://pixabay.com/api/?key=44971209-3e91d4aa0c3fb21a9e18e6c31&q='+encodeURIComponent(q+' food')+'&image_type=photo&per_page=24&safesearch=true');
    var d=await r.json();
    showRes((d.hits||[]).map(function(p){return{url:p.webformatURL,src:'Pixabay'};}));
  }catch(e){document.getElementById('rg').innerHTML='<div class="lm">Hata: '+e.message+'</div>';}
}

function searchStorage(q){
  var s=slug(q);
  var variants=[s,s+'-kac-kalori',s+'tarifi',s+'-tarifi'];
  showRes(variants.map(function(v){return{url:STURL+v+'.jpg',src:'Storage'};}));
}

function showRes(items){
  if(!items.length){document.getElementById('rg').innerHTML='<div class="lm">Sonuc bulunamadi</div>';return;}
  var html='';
  items.forEach(function(item,i){
    html+='<div class="ri" id="ri'+i+'" onclick="selImg(\''+item.url.replace(/'/g,'%27')+'\','+i+')">'
      +'<img src="'+item.url+'" loading="lazy" onerror="this.parentElement.style.display=\'none\'">'
      +'<div class="rsrc">'+item.src+'</div>'
      +'</div>';
  });
  document.getElementById('rg').innerHTML=html;
}

function selImg(url,idx){
  document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('sel');});
  var el=document.getElementById('ri'+idx);
  if(el)el.classList.add('sel');
  selUrl=decodeURIComponent(url);
  document.getElementById('savebtn').disabled=false;
  document.getElementById('selinfo').textContent='Secildi';
}

function useUrl(){
  var url=document.getElementById('curl').value.trim();
  if(!url)return;
  selUrl=url;
  document.getElementById('savebtn').disabled=false;
  document.getElementById('selinfo').textContent='URL secildi';
}

function onDrop(e){
  e.preventDefault();
  var file=e.dataTransfer.files[0];
  if(file)processFile(file);
}
function onFileSelect(e){
  var file=e.target.files[0];
  if(file)processFile(file);
}

async function processFile(file){
  if(!file.type.startsWith('image/')){alert('Sadece resim');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    document.getElementById('uthumb').src=e.target.result;
    document.getElementById('uprev').style.display='block';
  };
  reader.readAsDataURL(file);
  document.getElementById('umsg').textContent='Yukleniyor...';
  try{
    var s=slug(curFood.name);
    var ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    var fname=s+'.'+ext;
    var ab=await file.arrayBuffer();
    var blob=new Blob([ab],{type:file.type});
    var key=SVCKEY||SB_KEY;
    var r=await fetch(SB_URL+'/storage/v1/object/food-images/'+fname,{
      method:'POST',
      headers:{Authorization:'Bearer '+key,apikey:key,'Content-Type':file.type,'x-upsert':'true'},
      body:blob
    });
    if(r.ok){
      selUrl=STURL+fname;
      document.getElementById('umsg').textContent='Yuklendi! Kaydet e bas.';
      document.getElementById('uthumb').src=selUrl;
      document.getElementById('savebtn').disabled=false;
      document.getElementById('selinfo').textContent='Dosya yuklendi';
    }else{
      var err=await r.text();
      document.getElementById('umsg').textContent='Hata: '+err.slice(0,80);
    }
  }catch(e){document.getElementById('umsg').textContent='Hata: '+e.message;}
}

async function doSave(){
  if(!selUrl||!curFood){alert('Resim secilmedi');return;}
  document.getElementById('savebtn').disabled=true;
  document.getElementById('savebtn').textContent='Kaydediliyor...';
  var r=await sb.from('foods').update({photo_url:selUrl,photo_status:'approved'}).eq('id',curFood.id).select();
  document.getElementById('savebtn').textContent='Kaydet';
  if(r.error){alert('DB Hata: '+r.error.message);document.getElementById('savebtn').disabled=false;return;}
  var f=foods.find(function(x){return x.id==curFood.id;});
  if(f){f.photo_url=selUrl;f.photo_status='approved';}
  var c=document.getElementById('c'+curFood.id);
  if(c){
    var img=c.querySelector('img');
    if(img)img.src=selUrl+'?t='+Date.now();
    c.className='card ok';
    c.querySelector('.dot').className='dot dok';
  }
  updateStats();
  closeM();
}

sb.from('foods').select('photo_status').limit(1).then(function(r){
  if(r.error&&r.error.message.indexOf('photo_status')>=0){
    alert('SQL Editor da su komutu calistir:\nALTER TABLE foods ADD COLUMN IF NOT EXISTS photo_status text;');
  }else{loadFoods();}
});
</script>
</body>
</html>
